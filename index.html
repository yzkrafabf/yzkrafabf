<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yzk Rafa BF</title>
    <link rel="stylesheet" href="styles.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 500;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .container {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
    }

    .profile {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        padding: 40px 30px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 700;
    }

    .description {
        text-align: center;
        font-size: 1.5rem;
        margin-bottom: 30px;
        color: #666;
        letter-spacing: 2px;
    }

    .social-links {
        list-style-type: none;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
    }

    .social-links li {
        margin: 0;
        border-radius: 15px;
        overflow: hidden;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        animation: fadeInUp 0.5s ease forwards;
        opacity: 0;
    }

    .social-links li:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .social-links a {
        display: block;
        padding: 15px 20px;
        text-decoration: none;
        color: #333;
        background-color: #f8f9fa;
        transition: all 0.3s ease;
        border-left: 4px solid transparent;
        font-weight: 600;
        text-align: left;
    }

    .social-links a.gmail { border-left-color: #EA4335; }
    .social-links a.youtube { border-left-color: #FF0000; }
    .social-links a.facebook { border-left-color: #1877F2; }
    .social-links a.whatsapp { border-left-color: #25D366; }
    .social-links a.x { border-left-color: #000000; }
    .social-links a.instagram { border-left-color: #E4405F; }
    .social-links a.tiktok { border-left-color: #000000; }
    .social-links a.telegram { border-left-color: #0088cc; }
    .social-links a.threads { border-left-color: #000000; }
    .social-links a.snapchat { border-left-color: #FFFC00; }
    .social-links a.spotify { border-left-color: #1DB954; }
    .social-links a.discord { border-left-color: #5865F2; }
    .social-links a.reddit { border-left-color: #FF4500; }
    .social-links a.linkedin { border-left-color: #0A66C2; }
    .social-links a.github { border-left-color: #333; }

    .social-links a:hover {
        background-color: #ffffff;
        padding-left: 25px;
        box-shadow: inset 0 0 0 2px rgba(102, 126, 234, 0.1);
    }

    .social-links a.gmail:hover { background: linear-gradient(135deg, #fff, #fce8e6); }
    .social-links a.youtube:hover { background: linear-gradient(135deg, #fff, #ffe5e5); }
    .social-links a.facebook:hover { background: linear-gradient(135deg, #fff, #e7f0ff); }
    .social-links a.whatsapp:hover { background: linear-gradient(135deg, #fff, #e5fff0); }
    .social-links a.x:hover { background: linear-gradient(135deg, #fff, #f2f2f2); }
    .social-links a.instagram:hover { background: linear-gradient(135deg, #fff, #fde7f0); }
    .social-links a.tiktok:hover { background: linear-gradient(135deg, #fff, #f2f2f2); }
    .social-links a.telegram:hover { background: linear-gradient(135deg, #fff, #e5f4ff); }
    .social-links a.threads:hover { background: linear-gradient(135deg, #fff, #f2f2f2); }
    .social-links a.snapchat:hover { background: linear-gradient(135deg, #fff, #ffffe5); }
    .social-links a.spotify:hover { background: linear-gradient(135deg, #fff, #e5ffe5); }
    .social-links a.discord:hover { background: linear-gradient(135deg, #fff, #eef0ff); }
    .social-links a.reddit:hover { background: linear-gradient(135deg, #fff, #ffece5); }
    .social-links a.linkedin:hover { background: linear-gradient(135deg, #fff, #e5f0ff); }
    .social-links a.github:hover { background: linear-gradient(135deg, #fff, #f2f2f2); }

    .rss-button {
        width: 100%;
        padding: 15px 20px;
        border: none;
        border-radius: 15px;
        color: white;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        cursor: pointer;
        text-align: center;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        margin: 10px 0;
    }

    .rss-button:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .social-links li:nth-child(1) { animation-delay: 0.1s; }
    .social-links li:nth-child(2) { animation-delay: 0.2s; }
    .social-links li:nth-child(3) { animation-delay: 0.3s; }
    .social-links li:nth-child(4) { animation-delay: 0.4s; }
    .social-links li:nth-child(5) { animation-delay: 0.5s; }
    .social-links li:nth-child(6) { animation-delay: 0.6s; }
    .social-links li:nth-child(7) { animation-delay: 0.7s; }
    .social-links li:nth-child(8) { animation-delay: 0.8s; }
    .social-links li:nth-child(9) { animation-delay: 0.9s; }
    .social-links li:nth-child(10) { animation-delay: 1s; }
    .social-links li:nth-child(11) { animation-delay: 1.1s; }
    .social-links li:nth-child(12) { animation-delay: 1.2s; }
    .social-links li:nth-child(13) { animation-delay: 1.3s; }
    .social-links li:nth-child(14) { animation-delay: 1.4s; }
    .social-links li:nth-child(15) { animation-delay: 1.5s; }
    .social-links li:nth-child(16) { animation-delay: 1.6s; }

    @media (max-width: 768px) {
        .profile {
            padding: 30px 20px;
        }
        
        h1 {
            font-size: 2rem;
        }
        
        .description {
            font-size: 1.2rem;
        }
        
        .social-links {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 480px) {
        body {

        }

        }
        
        h1 {
            font-size: 1.8rem;
        }
        
        .description {
            font-size: 1rem;
        }
        
        .social-links a {
            padding: 12px 15px;
            font-size: 0.9rem;
        }
    }
